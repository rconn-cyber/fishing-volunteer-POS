<script>
// ── SAVE BOAT TO SUPABASE (walk-up only) ─────────────────────────────────────
async function saveBoatToSupabase(data) {
  try {
    const payload = {
      captainName:     data.name,
      captainEmail:    data.contact || '',
      captainPhone:    document.getElementById('pPhone') ? document.getElementById('pPhone').value.trim() : '',
      memberNumber:    data.member !== '999999' ? data.member : '999999',
      boatName:        document.getElementById('pBoatName') ? document.getElementById('pBoatName').value.trim() : '',
      divInshore:      !!divs.inshore,
      divOffshore:     !!divs.offshore,
      divTarpon:       !!divs.tarpon,
      twtInshore:      !!twts.inshore,
      twtOffshore:     !!twts.offshore,
      twtTarpon:       !!twts.tarpon,
      amountPaid:      data.total,
      paymentMethod:   data.pay,         // 'card' | 'cash'
      stripePaymentId: data.stripeId || null,
      extrasJson: {
        cap:      tkts.cap   || 0,
        pool:     tkts.pool  || 0,
        ban:      tkts.ban   || 0,
        all:      tkts.all   || 0,
        raff_ff:  raff.ff    || 0,
        raff_yeti:raff.yeti  || 0,
      },
    };

    const resp = await fetch('/.netlify/functions/save-boat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });
    const result = await resp.json();
    if (!result.success) {
      console.warn('save-boat warning (non-fatal):', result.error);
    } else {
      console.log('Boat saved to Supabase:', result.id);
    }
  } catch (err) {
    // Non-fatal — POS still works even if Supabase is unreachable
    console.warn('save-boat network error (non-fatal):', err.message);
  }
}

// ── FINALIZE (replace existing) ──────────────────────────────────────────────
function finalize(data, stripe) {
  txlog.push(data);
  renderLog();

  // Print receipt
  var pw = window.open('', '_blank', 'width=400,height=680');
  pw.document.write(buildReceipt(data, stripe));
  pw.document.close();
  setTimeout(function () { pw.print(); }, 400);

  // Save walk-up boats to Supabase (fire-and-forget, non-blocking)
  if (data.mode === 'walkin') {
    saveBoatToSupabase(data);
  }

  closeModal();
  clearPOS();
}
</script>
